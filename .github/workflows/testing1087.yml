name: testing-1087

on:
  workflow_dispatch:

jobs:
  ubuntu-20-first:
    name: Step 1 - Ubuntu 24.04  container
    runs-on: self-hosted

    container:
      image: ubuntu:24.04 

    steps:
      - uses: actions/checkout@v6
      - name: Ensure Sudo is Installed
        run: |
          if ! command -v sudo &> /dev/null; then
            echo "sudo could not be found. Installing..."
            apt-get update && apt-get install -y sudo
          fi
      - name: Fix pip cache permissions
        run: sudo chown -R $(whoami) /github/home 
      

      - name: Setup Python 3.12
        uses: gowridurgad/setup-python@testing-1087
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

     

  ubuntu-24-second:
    name: Step 2 - Ubuntu 20.04 container
    runs-on: self-hosted
    needs: ubuntu-20-first

    container:
      image: ubuntu:20.04 

    steps:
      - uses: actions/checkout@v6
    

      - name: Ensure Sudo is Installed
        run: |
          if ! command -v sudo &> /dev/null; then
            echo "sudo could not be found. Installing..."
            apt-get update && apt-get install -y sudo
          fi
      - name: Fix pip cache permissions
        run: sudo chown -R $(whoami) /github/home  
     

      - name: Setup Python 3.12
        uses: gowridurgad/setup-python@testing-1087
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
