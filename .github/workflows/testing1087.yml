name: testing-1087

on:
  workflow_dispatch:

jobs:
  ubuntu-20-first:
    name: Step 1 - Ubuntu 20.04 container
    runs-on: self-hosted

    container:
      image: ubuntu:20.04

    steps:
      - name: Install required tools
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl git ca-certificates tar bash

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Verify Python
        run: |
          python --version
          python -c "import ssl; print(ssl.OPENSSL_VERSION)"

  ubuntu-24-second:
    name: Step 2 - Ubuntu 24.04 container
    runs-on: self-hosted
    needs: ubuntu-20-first

    container:
      image: ubuntu:24.04

    steps:
      - name: Install required tools
        run: |
          apt-get update
          apt-get install -y curl git ca-certificates tar bash

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
