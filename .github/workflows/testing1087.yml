name: testing-1087

on:
  workflow_dispatch:

jobs:
  ubuntu-20-first:
    name: Step 1 - Ubuntu 24.04 container
    runs-on: self-hosted
    container:
      image: ubuntu:24.04
    steps:

      - name: Clear Python tool cache from previous runs
        run: |
          echo "Before:"
          ls -la /__w/_tool/Python/ 2>/dev/null || echo "(no Python dir)"
          rm -rf /__w/_tool/Python
          echo "After:"
          ls -la /__w/_tool/ 2>/dev/null
      - uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        # uses: gowridurgad/setup-python@testing-1087
        
        with:
          python-version: "3.11"

      - name: Upgrade pip 
        run: python -m pip install --upgrade pip

  ubuntu-24-second:
    name: Step 2 - Ubuntu 22.04 container (BUG SURFACES HERE)
    needs: ubuntu-20-first
    runs-on: self-hosted
    container:
      image: ubuntu:22.04
    steps:
      

      - uses: actions/checkout@v6


      - name: Setup Python 3.11 
        uses: actions/setup-python@v6
        # uses: gowridurgad/setup-python@testing-1087
        with:
          python-version: "3.11"


      - name: Upgrade pip 
        run: python -m pip install --upgrade pip
