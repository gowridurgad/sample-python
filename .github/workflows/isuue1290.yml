name: issue1290

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
   

    steps:
      - uses: actions/checkout@v5
      - name: Set path for Python setup step
        shell: bash
        run: echo "/usr/bin" >> $GITHUB_PATH
        

      - name: Set up Python 
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
         
          
     
