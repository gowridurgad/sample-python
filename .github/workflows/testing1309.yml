name: Reproduce 1087

on:
  workflow_dispatch:

jobs:
  job1-ubuntu-24-container:
    name: 1️⃣  Ubuntu 24.04 container / Python 3.8
    runs-on: [self-hosted]
    container: ubuntu:24.04
    steps:
      - name: Show OS info
        run: |
          echo "=== /etc/os-release ==="
          cat /etc/os-release
          echo "=== glibc ==="
          ldd --version | head -1

      - name: Ensure sudo is installed
        run: |
          if ! command -v sudo &> /dev/null; then
            apt-get update && apt-get install -y sudo
          fi

      - name: Fix permissions
        run: sudo chown -R $(whoami) /github/home

      - uses: actions/checkout@v6

      - name: Clear tool cache (force cache miss for clean repro)
        run: |
          rm -rf /__w/_tool/Python
          echo "Tool cache cleared:"
          ls -la /__w/_tool/ || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Show what was cached
        run: |
          echo "=== Tool cache contents after install ==="
          ls -la /__w/_tool/Python/
          ls -la /__w/_tool/Python/*/x64/ | head -20

      - name: pip install --upgrade pip (job 1 — should succeed)
        run: python -m pip install --upgrade pip

  job2-ubuntu-20-container:
    name: 2️⃣  Ubuntu 20.04 container / Python 3.8 (BUG surfaces here)
    needs: job1-ubuntu-24-container
    runs-on: [self-hosted]
    container: ubuntu:20.04
    steps:
      - name: Show OS info
        run: |
          echo "=== /etc/os-release ==="
          cat /etc/os-release
          echo "=== glibc ==="
          ldd --version | head -1

      - name: Ensure sudo is installed
        run: |
          if ! command -v sudo &> /dev/null; then
            apt-get update && apt-get install -y sudo
          fi

      - name: Fix permissions
        run: sudo chown -R $(whoami) /github/home

      - uses: actions/checkout@v6

      - name: Inspect tool cache populated by job 1
        run: |
          echo "=== Tool cache contents seen by job 2 ==="
          ls -la /__w/_tool/Python/ || echo "(no Python dir)"
          ls -la /__w/_tool/Python/*/x64/ 2>/dev/null | head -20 || true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Show where Python came from
        run: |
          which python
          python --version
          echo "pythonLocation=$pythonLocation"

      # 👇 The reproducer step from the issue.
      # Expected to FAIL with either:
      #   - "SSLError: Can't connect to HTTPS URL because the SSL module is not available"
      #   - "version `GLIBC_2.34' not found"
      - name: pip install --upgrade pip (job 2 — expected to FAIL)
        run: python -m pip install --upgrade pip
