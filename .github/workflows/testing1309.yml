name: Testing-1087

on:
  workflow_dispatch:

jobs:
  ubuntu-24-python38:
    name: Ubuntu 24.04 / Python 3.8
    runs-on: self-hosted
    container: ubuntu:24.04        
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git sudo

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

  ubuntu-20-python38:
    name: Ubuntu 20.04 / Python 3.8
    needs: ubuntu-24-python38
    runs-on: self-hosted
    container: ubuntu:20.04        
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl git sudo

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip  
