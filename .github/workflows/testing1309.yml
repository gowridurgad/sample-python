
name: Testing-1087


on:
  workflow_dispatch:

jobs:
  ubuntu-24-python38:
    name: Ubuntu 24.04 / Python 3.8
    runs-on: self-hosted
    steps:
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

  ubuntu-20-python38:
    name: Ubuntu 20.04 / Python 3.8
    needs: ubuntu-24-python38
    runs-on: self-hosted
    steps:
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
