name: Test 1309

on:
  
  workflow_dispatch:

jobs:
  latest-latest-in-practice-26-on-host-and-in-container:
    runs-on: ubuntu-latest
    container: ubuntu:latest
    steps:
      - name: Show host / container info
        run: |
          echo "=== /etc/os-release ==="
          cat /etc/os-release || true
          echo "=== uname -a ==="
          uname -a
          echo "=== whoami ==="
          whoami
          echo "=== RUNNER_OS / RUNNER_ARCH ==="
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
      - uses: actions/checkout@v6

      - name: Clear pre-mounted tool cache
        run: |
          echo "Before:"
          ls /__t/Python/ || echo "no Python dir"
          rm -rf /__t/Python
          echo "After:"
          ls /__t/Python/ || echo "cleared"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: pip install --upgrade pip (job 1 — should succeed)
        run: python -m pip install --upgrade pip
        
  test-26-on-host-and-24-in-container:
    runs-on: [self-hosted]
    container: ubuntu:24.04
    steps:
      - name: Show host / container info
        run: |
          echo "=== /etc/os-release ==="
          cat /etc/os-release || true
          echo "=== uname -a ==="
          uname -a
          echo "=== whoami ==="
          whoami
          echo "=== RUNNER_OS / RUNNER_ARCH ==="
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
      - uses: actions/checkout@v6

      - name: Ensure Sudo is Installed
        run: |
          if ! command -v sudo &> /dev/null; then
            echo "sudo could not be found. Installing..."
            apt-get update && apt-get install -y sudo
          fi
   
      - name: Clear tool cache
        run: |
          rm -rf /__w/_tool/Python
          echo "Verify cleared:"
          ls -la /__w/_tool/
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: pip install --upgrade pip 
        run: python -m pip install --upgrade pip
